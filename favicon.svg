<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <g fill="none" stroke="#1f7a4d" stroke-width="1" stroke-linecap="round">
    <!-- spokes -->
    <line x1="16" y1="16" x2="27" y2="16"/>
    <line x1="16" y1="16" x2="23.78" y2="23.78"/>
    <line x1="16" y1="16" x2="16" y2="27"/>
    <line x1="16" y1="16" x2="8.22" y2="23.78"/>
    <line x1="16" y1="16" x2="5" y2="16"/>
    <line x1="16" y1="16" x2="8.22" y2="8.22"/>
    <line x1="16" y1="16" x2="16" y2="5"/>
    <line x1="16" y1="16" x2="23.78" y2="8.22"/>
  </g>
  <!-- thin rim (the wheel) -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#1f7a4d" stroke-width="1.5"/>
  <!-- thick left arc: opens to the right so the rim reads as a "C" -->
  <path d="M22.88 25.83 A12 12 0 1 1 22.88 6.17" fill="none" stroke="#1f7a4d" stroke-width="4" stroke-linecap="round"/>
  <!-- hub -->
  <circle cx="16" cy="16" r="2.2" fill="#1f7a4d"/>
</svg>
